            <div class="right-side-container">
                <nav>
                    <ul class="nav-links">
                        <li><a href="#">Home</a></li>
                        <li><a href="#">Menu</a></li>

                            <li><a href="#">Neighborhood Listings <span><svg width="12" height="8" viewBox="0 0 12 8" xmlns="http://www.w3.org/2000/svg" fill="currentColor">

        </div>

    <section id="heroSection">
        <div class="hero-container">
            <div class="hero-background">
                <!-- Option Video if Preferred! -->

                <!-- <video class='hero-bg-video' src="./assets/videos/mac_n_cheese.mp4" type="video/mp4" autoplay muted loop></video> -->

                <!-- Static image if Preferred! -->

                <img class="hero-img" src="./assets/images/mommaHero-nowhitebg.png" alt="Cartoon Image of 'My Momma's House'.">
            </div>


        </div>
    </section>

    <section id="promoSection">
        <div class="promo-container">
            <div class="l-sided-food-img">
                <img src="./assets/images/ribsFood.jpg" alt="Camera photo of high-quality platter of ribs">
            </div>

            <div class="promo-text">
                <h2>🍽️ Made Like Sunday Dinner Every Day</h2>

                <hr>

                <p>
                    Every plate is prepared with fresh ingredients,
                    bold Southern flavor, and the kind of hospitality
                    that keeps families coming back for seconds.
                </p>

                <button class="ohno-btn">View Our Menu</button>
            </div>

            <div class="r-sided-food-img">
                <img src="./assets/images/martiniFood.jpg" alt="Camera photo of high-quality of Ceaser Salad and French Fries, neatly placed inside of a large martini glass.">
            </div>
        </div>
    </section>

    <section id="locationSection">
        <div class="location-container">
            <div class="contact-wrap"></div>
            <div class="googlemap" id="map"></div>
        </div>
    </section>
